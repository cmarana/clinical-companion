workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      groups:
        - app_store_credentials  # Configure no Codemagic: APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_PRIVATE_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.aacf366df8e043b2abf55d860c297835
      vars:
        BUNDLE_ID: "app.lovable.aacf366df8e043b2abf55d860c297835"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform
        script: |
          npx cap add ios || true
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --archive-path build/App.xcarchive
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/App.xcarchive
    integrations:
      app_store_connect: codemagic
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 18
      java: 17
      android_signing:
        - keystore_reference
      groups:
        - google_play_credentials
        - keystore_credentials
      vars:
        BUNDLE_ID: "app.lovable.aacf366df8e043b2abf55d860c297835"
        PACKAGE_NAME: "app.lovable.aacf366df8e043b2abf55d860c297835"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Add Android platform
        script: |
          npx cap add android || true
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Set Android package name
        script: |
          cd android
          sed -i "s/applicationId .*/applicationId \"$PACKAGE_NAME\"/" app/build.gradle
      - name: Build signed Android AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
